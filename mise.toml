[tools]
cmake = "4.2.1"
ninja = "1.13.1"
python = "3.13.11"

[env]
_.python.venv = { path = ".venv", create = true }
PROJECT_ROOT = "{{cwd}}"

[tasks.setup]
description = "Configura o ambiente (cria venv e instala dependências)"
run = """
python -m venv .venv
python -m pip install --upgrade pip
python -m pip install -r requirements.txt
echo "Ambiente configurado com sucesso!"
"""

[tasks.pli]
description = "Executa o PLI em todas as instâncias (Gurobi, 900s)"
run = """
python pli_model/run.py \
  --input data/instances \
  --output data/results/pli \
  --time-limit 900 \
  --solver gurobi \
"""

[tasks.pli-debug]
description = "Executa o PLI com log do solver visível"
run = """
python pli_model/run.py \
  --input data/instances \
  --output data/results/pli \
  --time-limit 900 \
  --solver gurobi \
  --tee \
"""

[tasks.cmake-configure]
description = "Configura o projeto CMake em Release e gera compile_commands.json em build/release"
run = """
cmake -S . -B build/release \
  -G "Ninja" \
  -DCMAKE_BUILD_TYPE=Release \
  -DTCC_ENABLE_LTO=ON \
  -DTCC_ENABLE_NATIVE=ON \
  -DTCC_ENABLE_OPENMP=ON \
  -DHSCOPT_ENABLE_LTO=ON \
  -DHSCOPT_ENABLE_NATIVE=ON \
  -DHSCOPT_ENABLE_OPENMP=ON \
"""

[tasks.cmake-link-compile-commands-release]
description = "Cria ou atualiza o link compile_commands.json para o build Release"
depends = ["cmake-configure"]
run = """
ln -sfn build/release/compile_commands.json compile_commands.json
"""

[tasks.cmake-compile-commands-release]
description = "Gera compile_commands.json e cria o link da raiz para Release"
depends = ["cmake-link-compile-commands-release"]
run = """
test -L compile_commands.json -o -f compile_commands.json
"""

[tasks.cmake-configure-debug]
description = "Configura o projeto CMake em Debug e gera compile_commands.json em build/debug"
run = """
cmake -S . -B build/debug \
  -G "Ninja" \
  -DCMAKE_BUILD_TYPE=Debug \
  -DTCC_ENABLE_LTO=OFF \
  -DTCC_ENABLE_NATIVE=OFF \
  -DTCC_ENABLE_OPENMP=ON \
  -DHSCOPT_ENABLE_LTO=OFF \
  -DHSCOPT_ENABLE_NATIVE=OFF \
  -DHSCOPT_ENABLE_OPENMP=ON \
"""

[tasks.cmake-link-compile-commands-debug]
description = "Cria ou atualiza o link compile_commands.json para o build Debug"
depends = ["cmake-configure-debug"]
run = """
ln -sfn build/debug/compile_commands.json compile_commands.json
"""

[tasks.cmake-compile-commands-debug]
description = "Gera compile_commands.json e cria o link da raiz para Debug"
depends = ["cmake-link-compile-commands-debug"]
run = """
test -L compile_commands.json -o -f compile_commands.json
"""

[tasks.cmake-build-all]
description = "Compila todos os binários de metaheurística em Release"
depends = ["cmake-configure"]
run = """
cmake --build build/release --target aco_ts hho_rvns brkga
"""

[tasks.cmake-build-metaheuristics]
description = "Compila os stubs de metaheurísticas em Release"
depends = ["cmake-configure"]
run = """
cmake --build build/release --target aco_ts hho_rvns brkga
"""

[tasks.cmake-build-aco-ts]
description = "Compila o main stub aco_ts"
depends = ["cmake-configure"]
run = """
cmake --build build/release --target aco_ts
"""

[tasks.cmake-build-hho-rvns]
description = "Compila o main stub hho_rvns"
depends = ["cmake-configure"]
run = """
cmake --build build/release --target hho_rvns
"""

[tasks.cmake-build-brkga]
description = "Compila o main stub brkga"
depends = ["cmake-configure"]
run = """
cmake --build build/release --target brkga
"""

[tasks.cmake-build-all-debug]
description = "Compila todos os binários de metaheurística em Debug"
depends = ["cmake-configure-debug"]
run = """
cmake --build build/debug --target aco_ts hho_rvns brkga
"""

[tasks.cmake-build-metaheuristics-debug]
description = "Compila os stubs de metaheurísticas em Debug"
depends = ["cmake-configure-debug"]
run = """
cmake --build build/debug --target aco_ts hho_rvns brkga
"""

[tasks.cmake-build-aco-ts-debug]
description = "Compila o main stub aco_ts em Debug"
depends = ["cmake-configure-debug"]
run = """
cmake --build build/debug --target aco_ts
"""

[tasks.cmake-build-hho-rvns-debug]
description = "Compila o main stub hho_rvns em Debug"
depends = ["cmake-configure-debug"]
run = """
cmake --build build/debug --target hho_rvns
"""

[tasks.cmake-build-brkga-debug]
description = "Compila o main stub brkga em Debug"
depends = ["cmake-configure-debug"]
run = """
cmake --build build/debug --target brkga
"""
