[tools]
cmake = "4.2.1"
python = "3.13.11"

[env]
PROJECT_ROOT = "{{cwd}}"
PYTHONPATH = "{{cwd}}"
VENV_PYTHON = "{{cwd}}/.venv/bin/python"
_.file = ".env"

[tasks.setup]
description = "Configura o ambiente (cria venv e instala dependências)"
run = """
python -m venv .venv
{{env.VENV_PYTHON}} -m pip install --upgrade pip
{{env.VENV_PYTHON}} -m pip install -r requirements.txt
echo "Ambiente configurado com sucesso!"
"""

[tasks.pli]
description = "Executa o PLI em todas as instâncias (Gurobi, 900s)"
run = """
{{env.VENV_PYTHON}} pli_model/run.py \
  --input data/instances \
  --output data/results/pli \
  --time-limit 900 \
  --solver gurobi \
"""

[tasks.pli-debug]
description = "Executa o PLI com log do solver visível"
run = """
{{env.VENV_PYTHON}} pli_model/run.py \
  --input data/instances \
  --output data/results/pli \
  --time-limit 900 \
  --solver gurobi \
  --tee \
"""
