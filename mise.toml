[tools]
cmake = "4.2.1"
conan = "latest"
ninja = "1.13.1"
pipx = "latest"
python = "3.13.11"

[env]
_.python.venv = { path = ".venv", create = true }
PROJECT_ROOT = "{{cwd}}"
CC = "/usr/bin/gcc"
CXX = "/usr/bin/g++"

[tasks.pli]
description = "Executa o PLI em todas as instâncias (necessário licença do Gurobi)"
run = """
python python/pli/run.py \
  --input data/instances \
  --output results/pli \
  --time-limit 900 \
  --solver gurobi
"""

[tasks.pli-debug]
description = "Executa o PLI com log detalhado (necessário licença do Gurobi)"
run = """
python python/pli/run.py \
  --input data/instances \
  --output results/pli \
  --time-limit 900 \
  --solver gurobi \
  --tee
"""

[tasks.configure-debug]
description = "Configura o projeto em Debug com GCC, logs habilitados e sanitizers"
run = """
conan install . --output-folder=. --build=missing -s build_type=Debug
cmake --fresh --preset conan-debug \
  -DENABLE_DEBUG_SANITIZERS=ON \
  -DENABLE_RELEASE_LTO=OFF
"""

[tasks.configure-release]
description = "Configura o projeto em Release otimizado para a CPU local"
run = """
conan install . --output-folder=. --build=missing -s build_type=Release
cmake --fresh --preset conan-release \
  -DENABLE_DEBUG_SANITIZERS=OFF \
  -DENABLE_RELEASE_LTO=ON \
  -DENABLE_NATIVE_OPTIMIZATIONS=ON
"""

[tasks.configure-perf]
description = "Configura o projeto em RelWithDebInfo para perfilamento"
run = """
conan install . --output-folder=. --build=missing -s build_type=RelWithDebInfo
cmake --fresh --preset conan-relwithdebinfo \
  -DENABLE_DEBUG_SANITIZERS=OFF \
  -DENABLE_RELEASE_LTO=OFF \
  -DENABLE_NATIVE_OPTIMIZATIONS=ON
"""

[tasks.build-debug]
description = "Compila todos os runners em Debug"
run = """
mise run configure-debug
cmake --build --preset conan-debug
"""

[tasks.build-release]
description = "Compila todos os runners em Release com a maior otimização segura"
run = """
mise run configure-release
cmake --build --preset conan-release
"""

[tasks.build-perf]
description = "Compila todos os runners em RelWithDebInfo para perf"
run = """
mise run configure-perf
cmake --build --preset conan-relwithdebinfo
"""

[tasks.compile-commands]
description = "Gera compile_commands.json e cria link na raiz do projeto"
run = """
mise run configure-debug
ln -sfn build/Debug/compile_commands.json compile_commands.json
"""
