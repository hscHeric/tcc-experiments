[tools]
cmake = "4.2.1"
ninja = "1.13.1"
python = "3.13.11"

[env]
_.python.venv = { path = ".venv", create = true }
PROJECT_ROOT = "{{cwd}}"

[tasks.pli]
description = "Executa o PLI em todas as instâncias (Necessário licença do gurobi)"
run = """
python python/pli/run.py \
  --input data/instances \
  --output results/pli \
  --time-limit 900 \
  --solver gurobi
"""

[tasks.pli-debug]
description = "Executa o PLI com log detalhado (Necessário licença do gurobi)"
run = """
python python/pli/run.py \
  --input data/instances \
  --output results/pli \
  --time-limit 900 \
  --solver gurobi \
  --tee
"""

[tasks.build-debug]
description = "Configura e compila o projeto em Debug"
run = """
conan install . --output-folder=. --build=missing -s build_type=Debug
CC=/usr/bin/gcc CXX=/usr/bin/g++ cmake --fresh --preset conan-debug
cmake --build --preset conan-debug
"""

[tasks.build-release]
description = "Configura e compila o projeto em Release"
run = """
conan install . --output-folder=. --build=missing -s build_type=Release
CC=/usr/bin/gcc CXX=/usr/bin/g++ cmake -S . -B build/build/Release \
  -DCMAKE_TOOLCHAIN_FILE=build/build/Release/generators/conan_toolchain.cmake \
  -DCMAKE_C_COMPILER=/usr/bin/gcc \
  -DCMAKE_CXX_COMPILER=/usr/bin/g++ \
  -DCMAKE_BUILD_TYPE=Release
cmake --build build/build/Release
"""

[tasks.compile-commands]
description = "Gera compile_commands.json e cria link na raiz do projeto"
run = """
conan install . --output-folder=. --build=missing -s build_type=Debug
CC=/usr/bin/gcc CXX=/usr/bin/g++ cmake --fresh --preset conan-debug
ln -sfn build/Debug/compile_commands.json compile_commands.json
"""
